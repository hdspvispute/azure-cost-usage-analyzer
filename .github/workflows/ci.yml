name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock

      - name: Run tests
        run: pytest -q

      - name: Validate structured context JSON
        run: python -m json.tool context/app_context.json > /dev/null

      - name: Validate required docs exist
        run: |
          test -f docs/requirements.md
          test -f docs/architecture.md
          test -f docs/nfr.md
          test -f docs/decisions.md

      - name: Secret hygiene guard
        run: |
          ! grep -R -n -E "(client_secret|AZURE_CLIENT_SECRET|password\s*=|AccountKey=|DefaultEndpointsProtocol=)" app docs context .github
